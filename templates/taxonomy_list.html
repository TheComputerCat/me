{% extends "base.html" %}

{% block title %}{{ trans(key="tags", lang=lang) }} — {{ config.title }}{% endblock %}

{% block body %}
<div id="content-wrapper">
  <div id="main">
    <div class="section-header">
      <h1>{{ trans(key="tags", lang=lang) }}</h1>
    </div>
    <ul>
      {% for term in terms %}
        <li><a href="{{ term.permalink }}">#{{ term.name }}</a> ({{ term.pages | length }})</li>
      {% endfor %}
    </ul>
  </div>
</div>
{% endblock %}
